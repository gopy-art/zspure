<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>FortiGate</title>
    <base href="/static/">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
    <link rel="shortcut icon" type="image/x-icon" href="favicon/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
    <link rel="manifest" href="favicon/site.webmanifest">
    <link rel="mask-icon" href="favicon/safari-pinned-tab.svg" color="#d43527">
    <link rel="shortcut icon" href="favicon/favicon.ico">
    <meta name="msapplication-TileColor" content="#d43527">
    <meta name="msapplication-config" content="favicon/browserconfig.xml">

    <script>
        function login_redirect(error) {
            'use strict';
            var url = window.location.pathname + window.location.search + window.location.hash;
            if (error) {
                console.warn(`Redirecting to login page: ${error}`);
            } else {
                console.warn('Redirecting to login page');
            }
            window.location.href = '/logout?redir=' + encodeURIComponent(url);
        }

        window.__fosLoginRedirect__ = login_redirect;

        fetch('/api/v2/monitor/web-ui/extend-session').then(response => {
            if (!response.ok && response.status === 401) {
                login_redirect();
            }
        });
    </script>
    <style>
        body {
            font-family: var(--nu-theme-font-family), Helvetica, Arial, sans-serif;
            font-weight: var(--nu-theme-dimension-normal-font-weight)
        }

        body {
            background-color: rgb(var(--nu-theme-override-text-background, var(--nu-theme-color-background-level0)));
            color: rgb(var(--nu-theme-on-color-background));
            font-size: 15px !important
        }

        * {
            scrollbar-width: auto;
            scrollbar-color: rgb(var(--nu-theme-color-background-level5)) rgba(0, 0, 0, 0)
        }

        *::-webkit-scrollbar {
            background-color: #0000;
            width: 15px
        }

        *::-webkit-scrollbar-thumb {
            min-height: 30px;
            border: 3px solid rgba(0, 0, 0, 0);
            background-clip: padding-box;
            border-radius: 7px;
            background-color: rgb(var(--nu-theme-color-background-level5))
        }

        *::-webkit-scrollbar-button {
            width: 0;
            height: 0;
            display: none
        }

        *::-webkit-scrollbar-corner {
            background-color: #0000
        }

        body {
            margin: 0
        }
    </style>
    <link rel="stylesheet" href="styles.css" media="print" onload="this.media='all'"><noscript>
        <link rel="stylesheet" href="styles.css">
    </noscript>
</head>

<body>
    <fos-root></fos-root>
    <script src="runtime.js" type="module"></script>
    <script src="polyfills.js" type="module"></script>
    <script src="main.js" type="module"></script>
</body>

</html>
